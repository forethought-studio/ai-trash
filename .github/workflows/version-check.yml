name: Version check

on:
  push:
    tags:
      - 'v*'

jobs:
  verify-version:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version string matches tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          REPORTED=$(bash ai-trash version | awk '{print $2}')
          if [[ "$REPORTED" != "$TAG" ]]; then
            echo "error: ai-trash version reports '$REPORTED' but tag is 'v$TAG'" >&2
            echo "Run ./release.sh instead of tagging manually." >&2
            exit 1
          fi
          echo "OK: ai-trash version matches tag v$TAG"
